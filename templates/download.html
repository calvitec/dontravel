<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CV Ready - CV Builder Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Inter', sans-serif; }
        .gradient-bg { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        .glass-card { background: rgba(255,255,255,0.95); backdrop-filter: blur(10px); }
        .success-check { animation: pop 0.5s ease-out; }
        @keyframes pop { 0% { transform: scale(0); } 50% { transform: scale(1.2); } 100% { transform: scale(1); } }
    </style>
</head>
<body class="gradient-bg min-h-screen flex items-center justify-center py-8 px-4">
    <div class="glass-card rounded-3xl shadow-2xl p-8 md:p-12 max-w-lg w-full text-center">
        <!-- Success Icon -->
        <div class="success-check inline-block bg-green-100 rounded-full p-4 mb-6">
            <i class="fas fa-check-circle text-green-500 text-6xl"></i>
        </div>

        <h2 class="text-3xl font-extrabold text-gray-800 mb-2">CV Ready!</h2>
        <p class="text-gray-500 mb-6">Your professional CV has been generated successfully.</p>

        <!-- File Info -->
        <div class="bg-gray-50 rounded-xl p-4 mb-6">
            <i class="fas fa-file-pdf text-red-500 text-2xl mb-2 block"></i>
            <p class="font-semibold text-gray-700">{{ name }}.pdf</p>
            <p class="text-xs text-gray-400">~ 2 pages · Professional Layout</p>
        </div>

        <!-- Download Button -->
        <a href="/download/{{ filename }}" 
            class="block bg-gradient-to-r from-blue-600 to-purple-600 hover:from-blue-700 hover:to-purple-700 text-white font-bold py-4 px-6 rounded-2xl transition-all duration-200 transform hover:scale-[1.02] shadow-lg mb-4">
            <i class="fas fa-download mr-3"></i> Download CV
        </a>

        <!-- Back Button -->
        <a href="/" 
            class="block bg-gray-100 hover:bg-gray-200 text-gray-700 font-semibold py-3 px-6 rounded-2xl transition-all duration-200">
            <i class="fas fa-plus mr-2"></i> Create Another CV
        </a>

        <div class="mt-6 text-xs text-gray-400">
            <i class="fas fa-shield-alt mr-1"></i> Your data is not stored
        </div>
    </div>

    <script>
        // Auto-download after 2 seconds
        setTimeout(function() {
            window.location.href = "/download/{{ filename }}";
        }, 2000);
    </script>
</body>
</html>
